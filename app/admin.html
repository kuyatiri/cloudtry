<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f4f6;
display:flex
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111827;
color:white;
height:100vh;
padding-top:20px;
position:fixed
}

.sidebar h2{
text-align:center;
margin-bottom:30px
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:15px;
text-align:left;
cursor:pointer
}

.sidebar button:hover{
background:#1f2937
}

/* MAIN */

.main{
margin-left:220px;
padding:30px;
width:100%
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

/* STATS */

.cards{
display:flex;
gap:20px
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:6px;
font-size:18px
}

/* TABLE */

table{
width:100%;
border-collapse:collapse
}

th,td{
padding:10px;
border-bottom:1px solid #ddd
}

th{
background:#f1f5f9
}

button{
background:#22c55e;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer
}

button:hover{
background:#16a34a
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
width:350px
}

.modal-box input,
.modal-box textarea{
width:100%;
padding:8px;
margin-bottom:10px
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active Users</button>
<button onclick="show('plans')">Plans</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
Users
<h2 id="statUsers">0</h2>
</div>

<div class="card">
Active Sessions
<h2 id="statSessions">0</h2>
</div>

<div class="card">
Expired Users
<h2 id="statExpired">0</h2>
</div>

<div class="card">
Revenue
<h2>$<span id="statRevenue">0</span></h2>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<input id="searchEmail" placeholder="Search email">

<table id="usersTable"></table>

</div>

<!-- ACTIVE USERS -->

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable">

<tr>
<th>Email</th>
<th>Device</th>
<th>IP</th>
<th>Last Login</th>
<th>Action</th>
</tr>

</table>

</div>

<!-- PLANS -->

<div id="plans" class="section" style="display:none">

<h2>Plans</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

<!-- EDIT USER MODAL -->

<div class="modal" id="editUserModal">

<div class="modal-box">

<h3>Edit User</h3>

<input id="editName" placeholder="Name">
<input id="editEmail" placeholder="Email">
<input id="editPassword" placeholder="Password">

<button onclick="saveUser()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- ADD PLAN MODAL -->

<div class="modal" id="addPlanModal">

<div class="modal-box">

<h3>Add Plan</h3>

<input id="planName" placeholder="Name">
<input id="planDevices" placeholder="Devices">
<input id="planPrice" placeholder="Price">
<textarea id="planDesc" placeholder="Description"></textarea>

<button onclick="addPlan()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- EDIT PLAN MODAL -->

<div class="modal" id="editPlanModal">

<div class="modal-box">

<h3>Edit Plan</h3>

<input id="editPlanId" type="hidden">
<input id="editPlanName">
<input id="editPlanDevices">
<input id="editPlanPrice">
<textarea id="editPlanDesc"></textarea>

<button onclick="savePlan()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=prompt("Admin Token")

/* NAVIGATION */

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* STATS */

async function loadStats(){

const res=await fetch(API+"/stats",{headers:{Authorization:token}})
const data=await res.json()

statUsers.innerText=data.total_users
statSessions.innerText=data.active_sessions
statExpired.innerText=data.expired_users
statRevenue.innerText=data.revenue

}

/* USERS */

async function loadUsers(){

const res=await fetch(API+"/users?page=1",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${formatExpiry(u.subscription_expiry)}</td>

<td>

<button onclick="openEditUser(${u.id},'${u.name}','${u.email}')">
Update
</button>

<button onclick="upgrade('${u.email}')">
Upgrade
</button>

</td>

</tr>
`

})

}

/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("activeTable")

data.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>
<td>${u.last_login}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

})

}

/* PLANS */

async function loadPlans(){

const res=await fetch(API+"/plans?page=1",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("plansTable")

table.innerHTML=`
<tr>
<th>Name</th>
<th>Devices</th>
<th>Price</th>
<th>Description</th>
<th>Action</th>
</tr>
`

data.plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.price}</td>
<td>${p.description||""}</td>

<td>

<button onclick="openEditPlan(${p.id},'${p.name}',${p.devices},${p.price},'${p.description||""}')">
Update
</button>

<button onclick="removePlan(${p.id})">
Remove
</button>

</td>

</tr>
`

})

}

/* MODAL FUNCTIONS */

function openAddPlan(){
addPlanModal.style.display="flex"
}

function openEditPlan(id,name,devices,price,desc){

editPlanId.value=id
editPlanName.value=name
editPlanDevices.value=devices
editPlanPrice.value=price
editPlanDesc.value=desc

editPlanModal.style.display="flex"

}

function openEditUser(id,name,email){

editingUser=id

editName.value=name
editEmail.value=email

editUserModal.style.display="flex"

}

function closeModal(){

document.querySelectorAll(".modal")
.forEach(m=>m.style.display="none")

}

/* EXPIRY COLOR */

function formatExpiry(date){

if(!date) return ""

const exp=new Date(date)
const now=new Date()

const days=Math.floor((exp-now)/(1000*60*60*24))

let color="green"

if(days<0) color="red"
else if(days<=3) color="orange"
else if(days<=7) color="gold"

return `${exp.toISOString().split("T")[0]}
<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin:0 6px;"></span>
${days} days`

}

/* INITIAL LOAD */

loadStats()
loadUsers()
loadPlans()
loadActive()

setInterval(loadActive,5000)

</script>

</body>
</html>
