<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:30px
}

.section{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:6px
}

table{
width:100%;
border-collapse:collapse
}

td,th{
padding:8px;
border-bottom:1px solid #ddd
}

button{
padding:6px 10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer
}

button:hover{
background:#16a34a
}

#dashboard{
display:none
}

.login{
max-width:300px;
margin:auto
}

input,select{
padding:6px;
margin:4px
}

</style>

</head>

<body>

<h1>TIRI IPTV Admin Dashboard</h1>

<!-- LOGIN -->

<div id="loginBox" class="section login">

<h3>Admin Login</h3>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="section">

<h3>Statistics</h3>

<div id="stats"></div>

</div>

<div class="section">

<h3>Users Dashboard</h3>

<input id="search" placeholder="Search email">

<select id="sort">
<option value="id">Newest</option>
<option value="expiry">Expiry</option>
<option value="plan">Plan</option>
<option value="email">Email</option>
</select>

<button onclick="loadUsers()">Refresh</button>

<table id="usersTable"></table>

<div id="pagination"></div>

<button onclick="bulkBan()">Ban Selected</button>
<button onclick="bulkActivate()">Activate Selected</button>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let page=1
let selected=[]

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
})

const data=await res.json()

if(data.token){

token=data.token

document.getElementById("loginBox").style.display="none"
document.getElementById("dashboard").style.display="block"

loadStats()
loadUsers()

}else{

alert("Login failed")

}

}

async function loadStats(){

const res=await fetch(API+"/stats",{
headers:{Authorization:token}
})

const data=await res.json()

stats.innerHTML=`
Users: ${data.total_users}<br>
Active Sessions: ${data.active_sessions}<br>
Expired Users: ${data.expired_users}<br>
Revenue: $${data.revenue}
`

}

async function loadUsers(p=1){

page=p

const search=document.getElementById("search").value
const sort=document.getElementById("sort").value

const res=await fetch(
API+"/users?page="+p+"&search="+search+"&sort="+sort,
{headers:{Authorization:token}}
)

const data=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th></th>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>
<input type="checkbox"
onclick="toggle(${u.id})">
</td>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${u.subscription_expiry||""}</td>

</tr>
`

})

renderPagination(data.total,p)

}

function renderPagination(total,page){

const pages=Math.ceil(total/10)

let html=""

if(page>1)
html+=`<button onclick="loadUsers(${page-1})">Prev</button>`

for(let i=1;i<=pages;i++){
html+=`<button onclick="loadUsers(${i})">${i}</button>`
}

if(page<pages)
html+=`<button onclick="loadUsers(${page+1})">Next</button>`

pagination.innerHTML=html

}

function toggle(id){

if(selected.includes(id))
selected=selected.filter(x=>x!=id)
else
selected.push(id)

}

async function bulkBan(){

await fetch(API+"/bulk",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
ids:selected,
action:"ban"
})
})

loadUsers()

}

async function bulkActivate(){

await fetch(API+"/bulk",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
ids:selected,
action:"activate"
})
})

loadUsers()

}

document.getElementById("search").addEventListener("input",()=>{
loadUsers(1)
})

</script>

</body>
</html>
