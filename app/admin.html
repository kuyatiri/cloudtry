<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f4f6;
display:flex
}

/* LOGIN */

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
color:white
}

.login-box{
background:#1f2937;
padding:40px;
border-radius:8px;
width:300px
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:4px
}

.login-box button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111827;
color:white;
height:100vh;
padding-top:20px;
position:fixed
}

.sidebar h2{
text-align:center;
margin-bottom:30px
}

.sidebar button{
display:block;
width:100%;
background:none;
border:none;
color:white;
padding:15px;
text-align:left;
cursor:pointer
}

.sidebar button:hover{
background:#1f2937
}

/* MAIN */

.main{
margin-left:220px;
padding:30px;
width:100%
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

/* CARDS */

.cards{
display:flex;
gap:20px
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:6px
}

/* TABLE */

table{
width:100%;
border-collapse:collapse
}

th,td{
padding:10px;
border-bottom:1px solid #ddd
}

th{
background:#f1f5f9
}

button{
background:#22c55e;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer
}

button:hover{
background:#16a34a
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
width:350px
}

.modal-box input,
.modal-box textarea{
width:100%;
padding:8px;
margin-bottom:10px
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="panel" style="display:none;width:100%;">

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active Users</button>
<button onclick="show('plans')">Plans</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
Users
<h2 id="statUsers">0</h2>
</div>

<div class="card">
Active Sessions
<h2 id="statSessions">0</h2>
</div>

<div class="card">
Expired Users
<h2 id="statExpired">0</h2>
</div>

<div class="card">
Revenue
<h2>$<span id="statRevenue">0</span></h2>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<input id="searchEmail" placeholder="Search email">

<table id="usersTable"></table>

</div>

<!-- ACTIVE USERS -->

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable"></table>

</div>

<!-- PLANS -->

<div id="plans" class="section" style="display:none">

<h2>Plans</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let editingUser=null

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:document.getElementById("adminUser").value,
password:document.getElementById("adminPass").value
})
})

const data=await res.json()

if(data.token){

token=data.token

document.getElementById("loginPage").style.display="none"
document.getElementById("panel").style.display="flex"

loadStats()
loadUsers()
loadPlans()
loadActive()

}else{
alert("Invalid login")
}

}

/* NAV */

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* STATS */

async function loadStats(){

const res=await fetch(API+"/stats",{headers:{Authorization:token}})
const data=await res.json()

statUsers.innerText=data.total_users
statSessions.innerText=data.active_sessions
statExpired.innerText=data.expired_users
statRevenue.innerText=data.revenue

}

/* USERS */

async function loadUsers(){

const res=await fetch(API+"/users?page=1",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${formatExpiry(u.subscription_expiry)}</td>

<td>

<button onclick="upgrade('${u.email}')">Upgrade</button>

</td>

</tr>
`

})

}

/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("activeTable")

table.innerHTML=`
<tr>
<th>Email</th>
<th>Device</th>
<th>IP</th>
<th>Last Login</th>
<th>Action</th>
</tr>
`

data.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>
<td>${u.last_login}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

})

}

/* PLANS */

async function loadPlans(){

const res=await fetch(API+"/plans?page=1",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("plansTable")

table.innerHTML=`
<tr>
<th>Name</th>
<th>Devices</th>
<th>Price</th>
<th>Description</th>
</tr>
`

data.plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.price}</td>
<td>${p.description||""}</td>

</tr>
`

})

}

/* EXPIRY */

function formatExpiry(date){

if(!date) return ""

const exp=new Date(date)
const now=new Date()

const days=Math.floor((exp-now)/(1000*60*60*24))

return `${exp.toISOString().split("T")[0]} (${days} days)`

}

</script>

</body>
</html>
