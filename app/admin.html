<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
display:flex;
}

.sidebar{
width:230px;
background:#111827;
color:white;
height:100vh;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#1f2937;
}

.main{
margin-left:230px;
padding:30px;
width:100%;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

button{
background:#22c55e;
border:none;
padding:6px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.pagination{
margin-top:10px;
text-align:right;
}

.flag{
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active (<span id="onlineCount">0</span>)</button>

</div>

<div class="main">

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<h2 id="statUsers">0</h2>
</div>

<div class="card">
<h3>Active Sessions</h3>
<h2 id="statSessions">0</h2>
</div>

</div>

</div>

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<table id="usersTable"></table>

<div id="userPagination" class="pagination"></div>

</div>

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable"></table>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=prompt("Admin Token")

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* USERS */

async function loadUsers(page){

const res=await fetch(API+"/users?page="+page,{headers:{Authorization:token}})
const data=await res.json()

const table=usersTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>

<td>

<button>Update</button>
<button>Upgrade</button>

</td>

</tr>
`

})

}

/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

onlineCount.innerText=data.length

const table=activeTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Country</th>
<th>Device</th>
<th>IP</th>
<th>Action</th>
</tr>
`

for(let u of data){

let flag="🌍"

try{

const geo=await fetch(API+"/geo?ip="+u.ip_address)
const g=await geo.json()

flag=`<span class="flag">${g.flag}</span>${g.country}`

}catch{}

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${flag}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

}

}

/* ACTIONS */

async function kick(device){

if(!confirm("Kick device?")) return

await fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:device})
})

loadActive()

}

async function ban(email){

if(!confirm("Ban user?")) return

await fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

loadActive()

}

setInterval(loadActive,5000)

loadUsers(1)
loadActive()

</script>

</body>
</html>
