<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
display:flex;
}

/* LOGIN */

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.login-box{
background:#1f2937;
padding:40px;
border-radius:10px;
width:320px;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:12px;
border:none;
border-radius:5px;
}

.login-box button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
color:white;
height:100vh;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px 0;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#1f2937;
}

/* MAIN */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:8px;
}

.card h3{
margin:0;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

.actions button{
margin-right:6px;
}

/* BUTTON */

button{
background:#22c55e;
border:none;
padding:6px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* PAGINATION */

.pagination{
margin-top:10px;
text-align:right;
}

.pagination button{
margin-left:5px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:8px;
width:360px;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
width:100%;
padding:8px;
margin-bottom:10px;
}

/* TOAST */

.toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
}

/* FLAG */

.flag{
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<div id="panel" style="display:none;width:100%;">

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active (<span id="onlineCount">0</span>)</button>
<button onclick="show('plans')">Plans</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<h2 id="statUsers">0</h2>
</div>

<div class="card">
<h3>Active Sessions</h3>
<h2 id="statSessions">0</h2>
</div>

<div class="card">
<h3>Expired</h3>
<h2 id="statExpired">0</h2>
</div>

<div class="card">
<h3>Revenue</h3>
<h2>$<span id="statRevenue">0</span></h2>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<table id="usersTable"></table>

<div id="userPagination" class="pagination"></div>

</div>

<!-- ACTIVE USERS -->

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable"></table>

</div>

<!-- PLANS -->

<div id="plans" class="section" style="display:none">

<h2>Plans</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let currentPage=1

function notify(msg){

const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"

setTimeout(()=>t.style.display="none",3000)

}

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:adminUser.value,
password:adminPass.value
})
})

const data=await res.json()

if(data.token){

token=data.token

loginPage.style.display="none"
panel.style.display="flex"

loadStats()
loadUsers(1)
loadActive()

}else{
alert("Invalid login")
}

}

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* USERS PAGINATION */

async function loadUsers(page){

currentPage=page

const res=await fetch(API+"/users?page="+page,{headers:{Authorization:token}})
const data=await res.json()

const table=usersTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${u.subscription_expiry||""}</td>

<td class="actions">

<button onclick="openEditUser(${u.id},'${u.name}','${u.email}')">Update</button>
<button onclick="openUpgrade('${u.email}')">Upgrade</button>

</td>

</tr>
`

})

renderPagination(data.total,page)

}

function renderPagination(total,page){

const pages=Math.ceil(total/10)

let html=""

if(page>1)
html+=`<button onclick="loadUsers(${page-1})">Prev</button>`

for(let i=1;i<=pages;i++){
html+=`<button onclick="loadUsers(${i})">${i}</button>`
}

if(page<pages)
html+=`<button onclick="loadUsers(${page+1})">Next</button>`

userPagination.innerHTML=html

}

/* ACTIVE USERS + GEO */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

onlineCount.innerText=data.length

const table=activeTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Country</th>
<th>Device</th>
<th>IP</th>
<th>Action</th>
</tr>
`

for(let u of data){

let flag=""

try{

const geo=await fetch("https://ipapi.co/"+u.ip_address+"/json/")
const g=await geo.json()

flag=`<span class="flag">${g.country_flag_emoji}</span>${g.country_name}`

}catch{
flag="Unknown"
}

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${flag}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

}

}

async function kick(device){

if(!confirm("Kick device?")) return

await fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:device})
})

notify("Device kicked")

loadActive()

}

async function ban(email){

if(!confirm("Ban user?")) return

await fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

notify("User banned")

loadActive()

}

setInterval(loadActive,5000)

</script>

</body>
</html>
