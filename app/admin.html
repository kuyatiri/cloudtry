<!DOCTYPE html>
<html>
<head>

<title>TIRI Admin</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none
}

button{
background:#22c55e;
color:white;
cursor:pointer
}

button:hover{
background:#16a34a
}

#dashboard{
display:none
}

pre{
background:#020617;
padding:10px
}

</style>

</head>

<body>

<div class="card" id="login">

<h2>Admin Login</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div class="card" id="dashboard">

<h2>TIRI Dashboard</h2>

<input id="email" placeholder="User Email">

<button onclick="searchUser()">Search User</button>

<pre id="info"></pre>

<select id="plan">
<option>trial</option>
<option>basic</option>
<option>standard</option>
<option>premium</option>
</select>

<button onclick="updatePlan()">Change Plan</button>

<h3>Active Devices</h3>

<button onclick="loadDevices()">Load Devices</button>

<pre id="devices"></pre>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
})

const data=await res.json()

if(data.token){

token=data.token

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

}

}

/* SEARCH USER */

async function searchUser(){

const email=document.getElementById("email").value

const res=await fetch(API+"/user?email="+email,{
headers:{Authorization:token}
})

const data=await res.json()

window.currentUser=data

document.getElementById("info").textContent=
JSON.stringify(data,null,2)

}

/* UPDATE PLAN */

async function updatePlan(){

const plan=document.getElementById("plan").value

const res=await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:currentUser.email,
plan_name:plan
})
})

const data=await res.json()

alert("Plan updated")

searchUser()

}

/* LOAD DEVICES */

async function loadDevices(){

const res=await fetch(API+"/devices?user_id="+currentUser.id,{
headers:{Authorization:token}
})

const data=await res.json()

document.getElementById("devices").textContent=
JSON.stringify(data,null,2)

}

</script>

</body>

</html>
