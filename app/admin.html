<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:40px
}

h1{
text-align:center;
margin-bottom:40px
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.stats{
display:flex;
gap:40px;
font-size:18px
}

.searchbar{
display:flex;
gap:10px;
margin-bottom:15px
}

.searchbar input{
flex:1;
padding:8px
}

button{
padding:8px 14px;
border:none;
background:#22c55e;
color:white;
border-radius:4px;
cursor:pointer
}

button:hover{
background:#16a34a
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left
}

th{
background:#f8fafc
}

.actions button{
margin-right:6px
}

#login{
max-width:300px;
margin:auto
}

#dashboard{
display:none
}

.pagination{
text-align:right;
margin-top:10px
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
width:350px
}

.modal-box input,
.modal-box select,
.modal-box textarea{
width:100%;
padding:8px;
margin-bottom:10px
}

</style>

</head>

<body>

<h1>TIRI IPTV Admin Dashboard</h1>

<!-- LOGIN -->

<div id="login" class="section">

<h3>Admin Login</h3>

<input id="user" placeholder="username"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<!-- STATS -->

<div class="section">

<h2>Statistics</h2>

<div class="stats">

<div>Users: <span id="statUsers">0</span></div>

<div>Active Sessions: <span id="statSessions">0</span></div>

<div>Expired Users: <span id="statExpired">0</span></div>

<div>Revenue: $<span id="statRevenue">0</span></div>

</div>

</div>

<!-- USERS -->

<div class="section">

<h2>Users Dashboard</h2>

<div class="searchbar">

<input id="searchEmail" placeholder="Search email">

<select id="sort">
<option value="id">Newest</option>
<option value="expiry">Expiry</option>
<option value="plan">Plan</option>
<option value="email">Email</option>
</select>

<button onclick="loadUsers()">Refresh</button>

</div>

<table id="usersTable"></table>

<div id="usersPagination" class="pagination"></div>

</div>

<!-- ACTIVE USERS -->

<div class="section">

<h2>Active Users</h2>

<button onclick="loadActive()">Refresh</button>

<table id="activeTable">

<tr>
<th>Email</th>
<th>Device</th>
<th>IP</th>
<th>Last Login</th>
<th>Action</th>
</tr>

</table>

</div>

<!-- PLANS -->

<div class="section">

<h2>Plans Dashboard</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

<!-- EDIT USER MODAL -->

<div class="modal" id="editUserModal">

<div class="modal-box">

<h3>Edit User</h3>

<input id="editName" placeholder="Name">
<input id="editEmail" placeholder="Email">
<input id="editPassword" type="password" placeholder="New Password">

<button onclick="saveUser()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- ADD PLAN MODAL -->

<div class="modal" id="addPlanModal">

<div class="modal-box">

<h3>Add Plan</h3>

<input id="planName" placeholder="Name">
<input id="planDevices" placeholder="Devices">
<input id="planPrice" placeholder="Price">
<textarea id="planDesc" placeholder="Description"></textarea>

<button onclick="addPlan()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- EDIT PLAN MODAL -->

<div class="modal" id="editPlanModal">

<div class="modal-box">

<h3>Edit Plan</h3>

<input id="editPlanId" type="hidden">
<input id="editPlanName" placeholder="Name">
<input id="editPlanDevices" placeholder="Devices">
<input id="editPlanPrice" placeholder="Price">
<textarea id="editPlanDesc"></textarea>

<button onclick="savePlan()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let page=1
let editingUser=null

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data=await res.json()

if(data.token){

token=data.token

login.style.display="none"
dashboard.style.display="block"

loadStats()
loadUsers()
loadPlans()
loadActive()

}

}

/* STATS */

async function loadStats(){

const res=await fetch(API+"/stats",{headers:{Authorization:token}})
const data=await res.json()

statUsers.innerText=data.total_users
statSessions.innerText=data.active_sessions
statExpired.innerText=data.expired_users
statRevenue.innerText=data.revenue

}

/* USERS */

async function loadUsers(p=1){

page=p

const search=searchEmail.value
const sort=document.getElementById("sort").value

const res=await fetch(API+"/users?page="+p+"&search="+search+"&sort="+sort,{
headers:{Authorization:token}
})

const data=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${formatExpiry(u.subscription_expiry)}</td>

<td class="actions">

<button onclick="openEditUser(${u.id},'${u.name}','${u.email}')">Update</button>

<button onclick="upgrade('${u.email}')">Upgrade</button>

</td>

</tr>
`

})

}

/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("activeTable")

table.innerHTML=`
<tr>
<th>Email</th>
<th>Device</th>
<th>IP</th>
<th>Last Login</th>
<th>Action</th>
</tr>
`

data.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>
<td>${u.last_login}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

})

}

/* PLANS */

async function loadPlans(){

const res=await fetch(API+"/plans?page=1",{headers:{Authorization:token}})
const data=await res.json()

const table=document.getElementById("plansTable")

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Devices</th>
<th>Price</th>
<th>Description</th>
<th>Action</th>
</tr>
`

data.plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.price}</td>
<td>${p.description||""}</td>

<td>

<button onclick="openEditPlan(${p.id},'${p.name}',${p.devices},${p.price},'${p.description||""}')">Update</button>

<button onclick="removePlan(${p.id})">Remove</button>

</td>

</tr>
`

})

}

/* MODALS */

function openEditUser(id,name,email){

editingUser=id

editName.value=name
editEmail.value=email
editPassword.value=""

editUserModal.style.display="flex"

}

function openAddPlan(){
addPlanModal.style.display="flex"
}

function openEditPlan(id,name,devices,price,desc){

editPlanId.value=id
editPlanName.value=name
editPlanDevices.value=devices
editPlanPrice.value=price
editPlanDesc.value=desc

editPlanModal.style.display="flex"

}

function closeModal(){

document.querySelectorAll(".modal").forEach(m=>m.style.display="none")

}

/* SAVE USER */

async function saveUser(){

await fetch(API+"/update-user",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
id:editingUser,
name:editName.value,
email:editEmail.value,
password:editPassword.value
})
})

closeModal()
loadUsers(page)

}

/* ADD PLAN */

async function addPlan(){

await fetch(API+"/add-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
name:planName.value,
devices:planDevices.value,
price:planPrice.value,
description:planDesc.value
})
})

closeModal()
loadPlans()

}

/* UPDATE PLAN */

async function savePlan(){

await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
id:editPlanId.value,
name:editPlanName.value,
devices:editPlanDevices.value,
price:editPlanPrice.value,
description:editPlanDesc.value
})
})

closeModal()
loadPlans()

}

/* REMOVE PLAN */

function removePlan(id){

fetch(API+"/remove-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({id})
}).then(loadPlans)

}

/* ACTIONS */

function upgrade(email){

const plan=prompt("Enter plan name")

fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email,plan_name:plan})
})

}

function kick(device){

fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:device})
}).then(loadActive)

}

function ban(email){

fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}).then(loadActive)

}

/* EXPIRY COLOR */

function formatExpiry(date){

if(!date) return ""

const exp=new Date(date)
const now=new Date()

const diff=exp-now
const days=Math.floor(diff/(1000*60*60*24))

let color="green"

if(days<0) color="red"
else if(days<=3) color="orange"
else if(days<=7) color="gold"

return `${exp.toISOString().split("T")[0]} 
<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin:0 6px;"></span>
${days} days`

}

</script>

</body>
</html>
