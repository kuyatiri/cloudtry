<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
display:flex;
}

/* LOGIN */

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:#1f2937;
padding:40px;
border-radius:10px;
width:320px;
color:white;
}

.loginBox input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:5px;
}

.loginBox button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
color:white;
height:100vh;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px 0;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#1f2937;
}

/* MAIN */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:8px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

.actions button{
margin-right:6px;
}

/* BUTTON */

button{
background:#22c55e;
border:none;
padding:6px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* PAGINATION */

.pagination{
margin-top:10px;
text-align:right;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
z-index:999;
}

.modalBox{
background:white;
padding:25px;
border-radius:10px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.modalBox input,
.modalBox select,
.modalBox textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.modalActions{
display:flex;
justify-content:flex-end;
gap:10px;
}

/* TOAST */

.toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
}

.flag{
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<div id="panel" style="display:none;width:100%">

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active Users</button>
<button onclick="show('plans')">Plans</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
Users
<h2 id="statUsers">0</h2>
</div>

<div class="card">
Active
<h2 id="statSessions">0</h2>
</div>

<div class="card">
Expired
<h2 id="statExpired">0</h2>
</div>

<div class="card">
Revenue
<h2>$<span id="statRevenue">0</span></h2>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<input id="searchEmail" placeholder="Search email">

<table id="usersTable"></table>

<div id="usersPagination" class="pagination"></div>

</div>

<!-- ACTIVE USERS -->

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable"></table>

</div>

<!-- PLANS -->

<div id="plans" class="section" style="display:none">

<h2>Plans</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

</div>

<!-- UPDATE USER MODAL -->

<div class="modal" id="updateUserModal">

<div class="modalBox">

<h3>Update User</h3>

<input id="editUserId" type="hidden">
<input id="editName" placeholder="Name">
<input id="editEmail" placeholder="Email">
<input id="editPassword" placeholder="New Password">

<div class="modalActions">
<button onclick="closeModal()">Cancel</button>
<button onclick="saveUser()">Save</button>
</div>

</div>

</div>

<!-- UPGRADE MODAL -->

<div class="modal" id="upgradeModal">

<div class="modalBox">

<h3>Upgrade Plan</h3>

<input id="upgradeEmail" type="hidden">

<select id="upgradePlan"></select>

<div class="modalActions">
<button onclick="closeModal()">Cancel</button>
<button onclick="confirmUpgrade()">Upgrade</button>
</div>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let userPage=1

function notify(msg){

const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"

setTimeout(()=>t.style.display="none",3000)

}

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data=await res.json()

if(data.token){

token=data.token

loginPage.style.display="none"
panel.style.display="flex"

loadStats()
loadUsers(1)
loadActive()
loadPlans()
loadUpgradePlans()

}

}

/* NAV */

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* EXPIRY FORMAT */

function formatExpiry(date){

if(!date) return ""

const exp = new Date(date)
const now = new Date()

const diff = exp - now
const days = Math.floor(diff / (1000*60*60*24))

let color="green"

if(days < 0) color="red"
else if(days <= 3) color="orange"
else if(days <= 7) color="gold"

return `
${exp.toISOString().split("T")[0]}
<span style="
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
background:${color};
margin:0 6px;
"></span>
${days} days
`

}

/* USERS */

async function loadUsers(page){

userPage=page

const res=await fetch(API+"/users?page="+page,{
headers:{Authorization:token}
})

const data=await res.json()

const table=usersTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${formatExpiry(u.subscription_expiry)}</td>

<td class="actions">

<button onclick="openUpdateUser(${u.id},'${u.name}','${u.email}')">
Update
</button>

<button onclick="openUpgrade('${u.email}')">
Upgrade
</button>

</td>

</tr>
`

})

}

/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

const table=activeTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Country</th>
<th>Device</th>
<th>IP</th>
<th>Action</th>
</tr>
`

for(let u of data){

let flag="🌍"

try{

const g=await fetch(API+"/geo?ip="+u.ip_address)
const geo=await g.json()

flag=`<span class="flag">${geo.flag}</span>${geo.country}`

}catch{}

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${flag}</td>
<td>${u.device_type}</td>
<td>${u.ip_address}</td>

<td>

<button onclick="kick('${u.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>
`

}

}

/* LIVE REFRESH */

setInterval(loadActive,4000)

</script>

</body>
</html>
