<!DOCTYPE html>
<html>
<head>
<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none
}

button{
background:#22c55e;
color:white;
cursor:pointer
}

button:hover{
background:#16a34a
}

pre{
background:#020617;
padding:10px;
overflow:auto
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

td,th{
padding:8px;
border-bottom:1px solid #334155
}

th{
text-align:left
}

#dashboard{
display:none
}

.stat{
font-size:18px;
margin-top:5px
}

</style>

</head>

<body>

<div class="container">

<div class="card" id="login">

<h2>Admin Login</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<div class="card">

<h2>Statistics</h2>

<div id="stats"></div>

</div>

<div class="card">

<h2>User Management</h2>

<input id="email" placeholder="User Email">

<button onclick="searchUser()">Search User</button>

<pre id="userInfo"></pre>

<select id="plan">
<option value="trial">trial</option>
<option value="basic">basic</option>
<option value="standard">standard</option>
<option value="premium">premium</option>
</select>

<button onclick="updatePlan()">Change Plan</button>

<button onclick="suspendUser()">Suspend User</button>

<button onclick="activateUser()">Activate User</button>

</div>

<div class="card">

<h2>Active Devices</h2>

<button onclick="loadDevices()">Load Devices</button>

<table id="devicesTable"></table>

</div>

<div class="card">

<h2>Live Online Users</h2>

<button onclick="loadOnline()">Refresh</button>

<table id="onlineTable"></table>

</div>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let currentUser=null

async function login(){

const res = await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
})

const data = await res.json()

if(data.token){

token=data.token

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

loadStats()
loadOnline()

}else{

alert("Invalid login")

}

}

async function loadStats(){

const res = await fetch(API+"/stats",{
headers:{Authorization:token}
})

const data = await res.json()

document.getElementById("stats").innerHTML=`
<div class="stat">Total Users: ${data.total_users}</div>
<div class="stat">Active Sessions: ${data.active_sessions}</div>
<div class="stat">Expired Users: ${data.expired_users}</div>
`

}

async function searchUser(){

const email=document.getElementById("email").value

const res=await fetch(API+"/user?email="+email,{
headers:{Authorization:token}
})

const data=await res.json()

if(data.error){
alert(data.error)
return
}

currentUser=data

document.getElementById("userInfo").textContent=
JSON.stringify(data,null,2)

}

async function updatePlan(){

if(!currentUser){
alert("Search user first")
return
}

const plan=document.getElementById("plan").value

await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:currentUser.email,
plan_name:plan
})
})

alert("Plan updated")

searchUser()

}

async function suspendUser(){

if(!currentUser)return

await fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:currentUser.email
})
})

alert("User suspended")

}

async function activateUser(){

if(!currentUser)return

await fetch(API+"/activate",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:currentUser.email
})
})

alert("User activated")

}

async function loadDevices(){

if(!currentUser){
alert("Search user first")
return
}

const res=await fetch(API+"/devices?user_id="+currentUser.id,{
headers:{Authorization:token}
})

const data=await res.json()

let html=`<tr>
<th>Device</th>
<th>IP</th>
<th>Last Login</th>
<th></th>
</tr>`

data.forEach(d=>{

html+=`
<tr>
<td>${d.device_type}</td>
<td>${d.ip_address}</td>
<td>${d.last_login}</td>
<td>
<button onclick="kick('${d.device_id}')">Kick</button>
</td>
</tr>
`

})

document.getElementById("devicesTable").innerHTML=html

}

async function kick(id){

await fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:id})
})

loadDevices()

}

async function loadOnline(){

const res=await fetch(API+"/online",{
headers:{Authorization:token}
})

const data=await res.json()

let html=`<tr>
<th>User</th>
<th>IP</th>
<th>Device</th>
<th>Last Activity</th>
</tr>`

data.forEach(u=>{

html+=`
<tr>
<td>${u.email}</td>
<td>${u.ip_address}</td>
<td>${u.device_type}</td>
<td>${u.last_login}</td>
</tr>
`

})

document.getElementById("onlineTable").innerHTML=html

}

setInterval(loadOnline,5000)

</script>

</body>
</html>
