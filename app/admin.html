<!DOCTYPE html>
<html>
<head>
<title>TIRI Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#dashboard{display:none}

</style>

</head>

<body>

<div class="card" id="login">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="card" id="dashboard">

<h2>TIRI Admin Dashboard</h2>

<input id="email" placeholder="User Email">

<button onclick="searchUser()">Search User</button>

<div id="userInfo"></div>

<select id="plan">
<option value="trial">Trial</option>
<option value="basic">Basic</option>
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="txid" placeholder="Transaction ID">

<button onclick="updatePlan()">Update Plan</button>

</div>

<script>

const API = "admin.tiriwifi.qzz.io"

let token = localStorage.getItem("admin_token")

if(token){
document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"
}

async function login(){

const res = await fetch(API+"/login",{
method:"POST",
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
})

const data = await res.json()

if(data.token){

localStorage.setItem("admin_token",data.token)

token=data.token

location.reload()

}else{
alert("Login failed")
}

}

async function searchUser(){

const email=document.getElementById("email").value

const res=await fetch(API+"/user?email="+email,{
headers:{Authorization:token}
})

const data=await res.json()

document.getElementById("userInfo").innerHTML=
JSON.stringify(data,null,2)

}

async function updatePlan(){

const email=document.getElementById("email").value

const plan=document.getElementById("plan").value

const txid=document.getElementById("txid").value

const res=await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token
},
body:JSON.stringify({
email,
plan_name:plan,
txid
})
})

const data=await res.json()

alert(JSON.stringify(data,null,2))

}

</script>

</body>
</html>
