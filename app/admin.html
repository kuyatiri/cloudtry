<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:40px
}

h1{
text-align:center;
margin-bottom:40px
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.stats{
display:flex;
gap:40px;
font-size:18px
}

.searchbar{
display:flex;
gap:10px;
margin-bottom:15px
}

.searchbar input{
flex:1;
padding:8px
}

button{
padding:8px 14px;
border:none;
background:#22c55e;
color:white;
border-radius:4px;
cursor:pointer
}

button:hover{
background:#16a34a
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left
}

th{
background:#f8fafc
}

.actions button{
margin-right:6px
}

#login{
max-width:300px;
margin:auto
}

#dashboard{
display:none
}

</style>

</head>

<body>

<h1>TIRI IPTV Admin Dashboard</h1>

<div id="login" class="section">

<h3>Admin Login</h3>

<input id="user" placeholder="username"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<!-- STATS -->

<div class="section">

<h2>Statistics</h2>

<div class="stats">

<div>Users: <span id="statUsers">0</span></div>
<div>Active Sessions: <span id="statSessions">0</span></div>
<div>Expired Users: <span id="statExpired">0</span></div>

</div>

</div>

<!-- USERS -->

<div class="section">

<h2>Users Dashboard</h2>

<div class="searchbar">

<input id="searchEmail" placeholder="Name or Email">

<button onclick="searchUser()">Search</button>

</div>

<table id="usersTable">

<tr>
<th>Name</th>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>

<!-- PLANS -->

<div class="section">

<h2>Plans Dashboard</h2>

<button onclick="loadPlans()">Add</button>

<table id="plansTable">

<tr>
<th>Plan No</th>
<th>Description</th>
<th>Devices</th>
<th>Price</th>
<th>Action</th>
</tr>

</table>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""

async function login(){

const res = await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data = await res.json()

if(data.token){

token=data.token

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

loadStats()

}else{

alert("Login failed")

}

}

async function loadStats(){

const res = await fetch(API+"/stats",{
headers:{Authorization:token}
})

const data = await res.json()

statUsers.innerText=data.total_users
statSessions.innerText=data.active_sessions
statExpired.innerText=data.expired_users

}

async function searchUser(){

const email=searchEmail.value

const res=await fetch(API+"/user?email="+email,{
headers:{Authorization:token}
})

const user=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th>Name</th>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Action</th>
</tr>
`

if(user.error)return

const daysRemaining = Math.floor(
(new Date(user.subscription_expiry)-Date.now())/86400000
)

table.innerHTML+=`
<tr>

<td>${user.name}</td>

<td>${user.email}</td>

<td>${user.plan}</td>

<td>${user.status} (${daysRemaining} days)</td>

<td class="actions">

<button onclick="updatePlan('${user.email}')">Update</button>

<button onclick="suspend('${user.email}')">Ban</button>

<button onclick="kick('${user.id}')">Kick</button>

</td>

</tr>
`

}

async function updatePlan(email){

const plan=prompt("Enter plan (trial/basic/standard/premium)")

await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
plan_name:plan
})
})

alert("Plan updated")

}

async function suspend(email){

await fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

alert("User banned")

}

async function kick(user_id){

const res=await fetch(API+"/devices?user_id="+user_id,{
headers:{Authorization:token}
})

const devices=await res.json()

for(let d of devices){

await fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:d.device_id})
})

}

alert("All devices kicked")

}

async function loadPlans(){

const res=await fetch(API+"/plans",{
headers:{Authorization:token}
})

const plans=await res.json()

const table=document.getElementById("plansTable")

plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.price}</td>

<td>

<button>Update</button>
<button>Remove</button>

</td>

</tr>
`

})

}

</script>

</body>
</html>
