<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:40px
}

h1{
text-align:center;
margin-bottom:40px
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.stats{
display:flex;
gap:40px;
font-size:18px
}

.searchbar{
display:flex;
gap:10px;
margin-bottom:15px
}

.searchbar input{
flex:1;
padding:8px
}

button{
padding:8px 14px;
border:none;
background:#22c55e;
color:white;
border-radius:4px;
cursor:pointer
}

button:hover{
background:#16a34a
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left
}

th{
background:#f8fafc
}

.actions button{
margin-right:6px
}

#login{
max-width:300px;
margin:auto
}

#dashboard{
display:none
}

.pagination{
text-align:right;
margin-top:10px
}

</style>

</head>

<body>

<h1>TIRI IPTV Admin Dashboard</h1>

<div id="login" class="section">

<h3>Admin Login</h3>

<input id="user" placeholder="username"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<!-- STATISTICS -->

<div class="section">

<h2>Statistics</h2>

<div class="stats">

<div>Users: <span id="statUsers">0</span></div>

<div>Active Sessions: <span id="statSessions">0</span></div>

<div>Expired Users: <span id="statExpired">0</span></div>

<div>Revenue: $<span id="statRevenue">0</span></div>

</div>

</div>

<!-- USERS DASHBOARD -->

<div class="section">

<h2>Users Dashboard</h2>

<div class="searchbar">

<input id="searchEmail" placeholder="Search email">

<select id="sort">
<option value="id">Newest</option>
<option value="expiry">Expiry</option>
<option value="plan">Plan</option>
<option value="email">Email</option>
</select>

<button onclick="loadUsers()">Refresh</button>

</div>

<table id="usersTable"></table>

<div style="display:flex; justify-content:space-between; margin-top:10px;">

<div>
<button onclick="bulkBan()">Ban Selected</button>
<button onclick="bulkActivate()">Activate Selected</button>
</div>

<div id="usersPagination" class="pagination"></div>

</div>

</div>

<!-- PLANS DASHBOARD -->

<div class="section">

<h2>Plans Dashboard</h2>

<button onclick="addPlan()">Add Plan</button>

<table id="plansTable">

<tr>
<th>ID</th>
<th>Name</th>
<th>Devices</th>
<th>Price</th>
<th>Action</th>
</tr>

</table>

</div>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let page=1
let selected=[]

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data=await res.json()

if(data.token){

token=data.token

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

loadStats()
loadUsers()
loadPlans()

}

}

/* STATS */

async function loadStats(){

const res = await fetch(API + "/stats", {
headers:{ Authorization: token }
})

const data = await res.json()

document.getElementById("statUsers").innerText =
data.total_users ?? 0

document.getElementById("statSessions").innerText =
data.active_sessions ?? 0

document.getElementById("statExpired").innerText =
data.expired_users ?? 0

document.getElementById("statRevenue").innerText =
data.revenue ?? 0

}
  
/* USERS */

async function loadUsers(p=1){

page=p

const search=searchEmail.value
const sort=document.getElementById("sort").value

const res=await fetch(
API+"/users?page="+p+"&search="+search+"&sort="+sort,
{headers:{Authorization:token}}
)

const data=await res.json()

const table=document.getElementById("usersTable")

table.innerHTML=`
<tr>
<th></th>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td><input type="checkbox" onclick="toggle(${u.id})"></td>

<td>${u.email}</td>
<td>${u.plan}</td>
<td>${u.status}</td>
<td>${formatExpiryColored(u.subscription_expiry)}</td>

<td class="actions">

<button onclick="updateUserPlan('${u.email}')">Update</button>

<button onclick="banUser('${u.email}')">Ban</button>

<button onclick="kickUser(${u.id})">Kick</button>

</td>

</tr>
`

})

renderPagination(data.total,p)

}

/* PAGINATION */

function renderPagination(total,page){

const pages=Math.ceil(total/10)

let html=""

if(page>1)
html+=`<button onclick="loadUsers(${page-1})">Prev</button>`

for(let i=1;i<=pages;i++){
html+=`<button onclick="loadUsers(${i})">${i}</button>`
}

if(page<pages)
html+=`<button onclick="loadUsers(${page+1})">Next</button>`

usersPagination.innerHTML=html

}

/* LIVE SEARCH */

searchEmail.addEventListener("input",()=>{
loadUsers(1)
})

/* BULK ACTIONS */

function toggle(id){

if(selected.includes(id))
selected=selected.filter(x=>x!=id)
else
selected.push(id)

}

async function bulkBan(){

await fetch(API+"/bulk",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
ids:selected,
action:"ban"
})
})

loadUsers()

}

async function bulkActivate(){

await fetch(API+"/bulk",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
ids:selected,
action:"activate"
})
})

loadUsers()

}

/* PLANS */

async function loadPlans(){

const res = await fetch(API+"/plans?page=1",{
headers:{Authorization:token}
})

const data = await res.json()

const table=document.getElementById("plansTable")

/* reset table first */
table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Devices</th>
<th>Price</th>
<th>Action</th>
</tr>
`

data.plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.price}</td>

<td>

<button onclick="updatePlan(${p.id})">Update</button>
<button onclick="removePlan(${p.id})">Remove</button>

</td>

</tr>
`

})

}

function addPlan(){

const name=prompt("Plan name")
const devices=prompt("Devices")
const price=prompt("Price")

fetch(API+"/add-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
name,devices,price
})
}).then(loadPlans)

}

  function updateUserPlan(email){

const plan=prompt("Enter new plan")

fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
plan_name:plan
})
}).then(loadUsers)

}

function banUser(email){

fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}).then(loadUsers)

}

async function kickUser(user_id){

const res=await fetch(API+"/devices?user_id="+user_id,{
headers:{Authorization:token}
})

const devices=await res.json()

for(let d of devices){

await fetch(API+"/kick",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({device_id:d.device_id})
})

}

alert("User devices kicked")

}

  function formatExpiry(date){

if(!date) return ""

const exp = new Date(date)
const now = new Date()

const diff = exp - now

const days = Math.floor(diff / (1000*60*60*24))

return `${exp.toISOString().split("T")[0]} (${days} days)`

}

function formatExpiryColored(date){

if(!date) return ""

const exp = new Date(date)
const now = new Date()

const diff = exp - now
const days = Math.floor(diff / (1000*60*60*24))

const expDate = exp.toISOString().split("T")[0]

let color="green"

if(days < 0) color="red"
else if(days <= 3) color="orange"
else if(days <= 7) color="gold"
else color="green"

return `
${expDate}
<span style="
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
background:${color};
margin:0 6px;
"></span>
${days} days
`

}

</script>

</body>
</html>
