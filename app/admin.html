<!DOCTYPE html>
<html>
<head>
<title>TIRI Admin</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none
}

button{
background:#22c55e;
color:white;
cursor:pointer
}

button:hover{
background:#16a34a
}

pre{
background:#020617;
padding:10px
}

#dashboard{
display:none
}

.stat{
display:flex;
justify-content:space-between;
margin-top:5px
}

</style>

</head>

<body>

<div class="card" id="login">

<h2>Admin Login</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div class="card" id="dashboard">

<h2>TIRI Admin Panel</h2>

<h3>Statistics</h3>

<div id="stats"></div>

<hr>

<input id="email" placeholder="User Email">

<button onclick="searchUser()">Search User</button>

<pre id="userInfo"></pre>

<select id="plan">
<option>trial</option>
<option>basic</option>
<option>standard</option>
<option>premium</option>
</select>

<button onclick="updatePlan()">Change Plan</button>

<button onclick="suspend()">Suspend User</button>
<button onclick="activate()">Activate User</button>

<h3>Devices</h3>

<button onclick="loadDevices()">Load Devices</button>

<pre id="devices"></pre>

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let currentUser=null

async function login(){

const username = document.getElementById("user").value
const password = document.getElementById("pass").value

const res = await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password
})
})

const data = await res.json()

if(data.token){

token = data.token

document.getElementById("login").style.display = "none"
document.getElementById("dashboard").style.display = "block"

loadStats()

}else{

alert("Invalid login")

}

}

async function loadStats(){

const res=await fetch(API+"/stats",{headers:{Authorization:token}})

const data=await res.json()

stats.innerHTML=`
<div class="stat">Users: ${data.total_users}</div>
<div class="stat">Active Sessions: ${data.active_sessions}</div>
<div class="stat">Expired Users: ${data.expired_users}</div>
`

}

async function searchUser(){

const res=await fetch(API+"/user?email="+email.value,{
headers:{Authorization:token}
})

const data=await res.json()

currentUser=data

userInfo.textContent=JSON.stringify(data,null,2)

}

async function updatePlan(){

await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
email:currentUser.email,
plan_name:plan.value
})
})

alert("Plan updated")

searchUser()

}

async function suspend(){

await fetch(API+"/suspend",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email:currentUser.email})
})

alert("User suspended")

}

async function activate(){

await fetch(API+"/activate",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({email:currentUser.email})
})

alert("User activated")

}

async function loadDevices(){

if(!currentUser){
alert("Search user first")
return
}

const res = await fetch(API+"/devices?user_id="+currentUser.id,{
headers:{Authorization:token}
})

const data = await res.json()

devices.textContent = JSON.stringify(data,null,2)

}

</script>

</body>
</html>
