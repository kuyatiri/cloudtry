<!DOCTYPE html>
<html>
<head>

<title>TIRI IPTV Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
display:flex;
}

/* LOGIN */

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:#1f2937;
padding:40px;
border-radius:10px;
width:320px;
color:white;
}

.loginBox input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:5px;
}

.loginBox button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
color:white;
height:100vh;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px 0;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#1f2937;
}

/* MAIN */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

.section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* CARDS */

.cards{
display:flex;
gap:20px;
}

.card{
flex:1;
background:#f9fafb;
padding:20px;
border-radius:8px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

.actions button{
margin-right:6px;
}

/* BUTTON */

button{
background:#22c55e;
border:none;
padding:6px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* PAGINATION */

.pagination{
margin-top:10px;
text-align:right;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
z-index:999;
}

.modalBox{
background:white;
padding:25px;
border-radius:10px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.modalBox input,
.modalBox select,
.modalBox textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.modalActions{
display:flex;
justify-content:flex-end;
gap:10px;
}

/* TOAST */

.toast{
position:fixed;
top:20px;
right:20px;
background:#22c55e;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
}

.flag{
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<div id="panel" style="display:none;width:100%">

<div class="sidebar">

<h2>TIRI Admin</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('users')">Users</button>
<button onclick="show('active')">Active Users</button>
<button onclick="show('plans')">Plans</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
Users
<h2 id="statUsers">0</h2>
</div>

<div class="card">
Active
<h2 id="statSessions">0</h2>
</div>

<div class="card">
Expired
<h2 id="statExpired">0</h2>
</div>

<div class="card">
Revenue
<h2>₱<span id="statRevenue">0</span></h2>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" class="section" style="display:none">

<h2>Users</h2>

<input id="searchEmail" placeholder="Search email">

<table id="usersTable"></table>

<div id="usersPagination" class="pagination"></div>

</div>

<!-- ACTIVE USERS -->

<div id="active" class="section" style="display:none">

<h2>Active Users</h2>

<table id="activeTable"></table>

</div>

<!-- PLANS -->

<div id="plans" class="section" style="display:none">

<h2>Plans</h2>

<button onclick="openAddPlan()">Add Plan</button>

<table id="plansTable"></table>

</div>

</div>

</div>

<!-- UPDATE USER MODAL -->

<div class="modal" id="updateUserModal">

<div class="modalBox">

<h3>Update User</h3>

<input id="editUserId" type="hidden">
<input id="editName" placeholder="Name">
<input id="editEmail" placeholder="Email">
<input id="editPassword" placeholder="New Password">

<div class="modalActions">
<button onclick="closeModal()">Cancel</button>
<button onclick="saveUser()">Save</button>
</div>

</div>

</div>

<!-- UPGRADE MODAL -->

<div class="modal" id="upgradeModal">

<div class="modalBox">

<h3>Upgrade Plan</h3>

<input id="upgradeEmail" type="hidden">

<select id="upgradePlan"></select>

<div class="modalActions">
<button onclick="closeModal()">Cancel</button>
<button onclick="confirmUpgrade()">Upgrade</button>
</div>

</div>

</div>

<!-- ADD PLAN MODAL -->
  
<!-- ADD PLAN MODAL -->
<div class="modal" id="addPlanModal">

<div class="modalBox">

<h3>Add Plan</h3>

<input id="planName" placeholder="Plan Name">
<input id="planDevices" type="number" placeholder="Devices">
<input id="planDuration" type="number" placeholder="Duration (days)">
<input id="planPrice" type="number" placeholder="Price">

<textarea id="planDescription" placeholder="Description"></textarea>

<div class="modalActions">

<button onclick="closeModal()">Cancel</button>
<button onclick="addPlan()">Add Plan</button>

</div>

</div>

</div>

  
<!-- EDIT PLAN MODAL -->
  
<div class="modal" id="editPlanModal">

<div class="modalBox">

<h3>Edit Plan</h3>

<input id="editPlanId" type="hidden">

<input id="editPlanName" placeholder="Plan Name">
<input id="editPlanDevices" type="number" placeholder="Devices">
<input id="editPlanDuration" type="number" placeholder="Duration (days)">
<input id="editPlanPrice" type="number" placeholder="Price">

<textarea id="editPlanDescription" placeholder="Description"></textarea>

<div class="modalActions">

<button onclick="closeModal()">Cancel</button>
<button onclick="updatePlan()">Update Plan</button>

</div>

</div>

</div>

  

</div>

<script>

const API="https://admin.tiriwifi.qzz.io"

let token=""
let userPage=1

function notify(msg){

const t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"

setTimeout(()=>t.style.display="none",3000)

}

/* LOGIN */

async function login(){

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

const data=await res.json()

if(data.token){

token=data.token

loginPage.style.display="none"
panel.style.display="flex"

loadStats()
loadUsers(1)
loadActive()
loadPlans()
loadUpgradePlans()

}

}

/* NAV */

function show(id){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

/* EXPIRY FORMAT */

function formatExpiry(date){

if(!date) return ""

const exp = new Date(date)
const now = new Date()

const diff = exp - now
const days = Math.floor(diff / (1000*60*60*24))

let color="green"

if(days < 0) color="red"
else if(days <= 3) color="orange"
else if(days <= 7) color="gold"

return `
${exp.toISOString().split("T")[0]}
<span style="
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
background:${color};
margin:0 6px;
"></span>
${days} days
`

}

/* USERS */

async function loadUsers(page){

userPage=page

const search = document.getElementById("searchEmail").value || ""

const res = await fetch(
API+"/users?page="+page+"&search="+encodeURIComponent(search),
{
headers:{Authorization:token}
})

const data = await res.json()

const table = usersTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Plan</th>
<th>Status</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.users.forEach(u=>{

table.innerHTML+=`
<tr>

<td>${u.email}</td>
<td>${u.plan || "-"}</td>
<td>${u.status}</td>
<td>${formatExpiry(u.subscription_expiry)}</td>

<td class="actions">

<button onclick="openUpdateUser(${u.id},'${u.name}','${u.email}')">
Update
</button>

<button onclick="openUpgrade(${u.id})">
Upgrade
</button>

</td>

</tr>
`

})

}
  
/* ACTIVE USERS */

async function loadActive(){

const res=await fetch(API+"/online",{headers:{Authorization:token}})
const data=await res.json()

const table=activeTable

table.innerHTML=`
<tr>
<th>Email</th>
<th>Country</th>
<th>Device</th>
<th>IP</th>
<th>Action</th>
</tr>
`

for(let u of data){

let warning=""

if(u.sharing){

warning=`
<div style="color:red;font-weight:bold">
⚠ Account sharing suspected
</div>
`

}

u.devices.forEach(d=>{

table.innerHTML+=`

<tr>

<td>${u.email}</td>

<td>
<span class="flag">${d.flag}</span>
${d.country}
</td>

<td>${d.device_type}</td>

<td>${d.ip_address}</td>

<td>

<button onclick="kick('${d.device_id}')">Kick</button>
<button onclick="ban('${u.email}')">Ban</button>

</td>

</tr>

<tr>

<td colspan="5">${warning}</td>

</tr>

`

})

}

}

async function loadStats(){

const res = await fetch(API+"/stats",{
headers:{Authorization:token}
})

const data = await res.json()

document.getElementById("statUsers").innerText =
data.total_users ?? 0

document.getElementById("statSessions").innerText =
data.active_sessions ?? 0

document.getElementById("statExpired").innerText =
data.expired_users ?? 0

document.getElementById("statRevenue").innerText =
data.revenue ?? 0

}

async function loadPlans(){

const res = await fetch(API+"/plans?page=1",{
headers:{Authorization:token}
})

const data = await res.json()

const table = document.getElementById("plansTable")

table.innerHTML=`
<tr>
<th>Name</th>
<th>Devices</th>
<th>Duration</th>
<th>Price</th>
<th>Description</th>
<th>Action</th>
</tr>
`

data.plans.forEach(p=>{

table.innerHTML+=`
<tr>

<td>${p.name}</td>
<td>${p.devices}</td>
<td>${p.duration_days} days</td>
<td>₱${p.price}</td>
<td>${p.description || ""}</td>

<td>

<button onclick="openEditPlan(
${p.id},
'${p.name}',
${p.devices},
${p.duration_days},
${p.price},
'${p.description||""}'
)">
Update
</button>

${p.name.toLowerCase() === "trial" 
? `<span style="color:gray">Protected</span>`
: `<button onclick="removePlan(${p.id})">Remove</button>`
}

</td>

</tr>
`

})

}
  
async function loadUpgradePlans(){

const res = await fetch(API+"/plans?page=1",{
headers:{Authorization:token}
})

const data = await res.json()

const select = document.getElementById("upgradePlan")

select.innerHTML=""

data.plans.forEach(p=>{

select.innerHTML+=`
<option value="${p.name}">
${p.name} (${p.devices} devices)
</option>
`

})

}

/* UPDATE USER MODAL */

function openUpdateUser(id,name,email){

document.getElementById("editUserId").value=id
document.getElementById("editName").value=name
document.getElementById("editEmail").value=email
document.getElementById("editPassword").value=""

document.getElementById("updateUserModal").style.display="flex"

}

/* SAVE USER */

async function saveUser(){

const id=document.getElementById("editUserId").value
const name=document.getElementById("editName").value
const email=document.getElementById("editEmail").value
const password=document.getElementById("editPassword").value

const res=await fetch(API+"/update-user",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
id,
name,
email,
password
})
})

const data=await res.json()

if(data.status){

notify("User updated")

closeModal()

loadUsers(userPage)

}else{

notify(data.error || "Update failed")

}

}

/* UPGRADE MODAL */

function openUpgrade(id){

document.getElementById("upgradeEmail").value=id
document.getElementById("upgradeModal").style.display="flex"

}

/* CONFIRM UPGRADE */

async function confirmUpgrade(){

const id = document.getElementById("upgradeEmail").value
const plan = document.getElementById("upgradePlan").value

const res = await fetch(API + "/update-user",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
id:id,
plan:plan
})
})

const data = await res.json()

if(data.status){

notify("Plan upgraded successfully")

closeModal()

loadUsers(userPage)
loadStats()

}else{

notify(data.error || "Upgrade failed")

}

}

/* KICK DEVICE */

async function kick(device){

if(!confirm("Kick this device?")) return

await fetch(API+"/kick",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
device_id:device
})
})

notify("Device kicked")

loadActive()

}

/* BAN USER */

async function ban(email){

if(!confirm("Ban this user?")) return

await fetch(API+"/suspend",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
email
})
})

notify("User banned")

loadUsers(userPage)
loadActive()

}

/* ADD PLAN MODAL */

function openAddPlan(){

document.getElementById("planName").value=""
document.getElementById("planDevices").value=""
document.getElementById("planDuration").value=""
document.getElementById("planPrice").value=""
document.getElementById("planDescription").value=""

document.getElementById("addPlanModal").style.display="flex"

}

/* EDIT PLAN */

function openEditPlan(id,name,devices,duration,price,desc){

document.getElementById("editPlanId").value=id
document.getElementById("editPlanName").value=name
document.getElementById("editPlanDevices").value=devices
document.getElementById("editPlanDuration").value=duration
document.getElementById("editPlanPrice").value=price
document.getElementById("editPlanDescription").value=desc

/* LOCK FIELDS FOR TRIAL */

if(name.toLowerCase()=="trial"){

document.getElementById("editPlanName").disabled=true
document.getElementById("editPlanPrice").disabled=true
document.getElementById("editPlanDescription").disabled=true

}else{

document.getElementById("editPlanName").disabled=false
document.getElementById("editPlanPrice").disabled=false
document.getElementById("editPlanDescription").disabled=false

}

document.getElementById("editPlanModal").style.display="flex"

}

async function updatePlan(){

const id=document.getElementById("editPlanId").value
const name=document.getElementById("editPlanName").value
const devices=document.getElementById("editPlanDevices").value
const duration=document.getElementById("editPlanDuration").value
const price=document.getElementById("editPlanPrice").value
const description=document.getElementById("editPlanDescription").value

const res=await fetch(API+"/update-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
id,
name,
devices,
duration_days:duration,
price,
description
})
})

const data=await res.json()

if(data.status){

notify("Plan updated successfully")

closeModal()

loadPlans()

}else{

notify(data.error || "Update failed")

}

}

/* REMOVE PLAN */

async function removePlan(id){

if(!confirm("Remove this plan?")) return

await fetch(API+"/remove-plan",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({id})
})

notify("Plan removed")

loadPlans()

}

/* CLOSE MODAL */

function closeModal(){

document.querySelectorAll(".modal")
.forEach(m=>m.style.display="none")

}

/* ADD PLAN */

async function addPlan(){

const name=document.getElementById("planName").value
const devices=document.getElementById("planDevices").value
const duration=document.getElementById("planDuration").value
const price=document.getElementById("planPrice").value
const description=document.getElementById("planDescription").value

if(!name || !devices || !duration || !price){

notify("All fields are required")

return

}

const res=await fetch(API+"/add-plan",{
method:"POST",
headers:{
Authorization:token,
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
devices,
duration_days:duration,
price,
description
})
})

const data=await res.json()

if(data.status){

notify("Plan added successfully")

closeModal()

loadPlans()

}else{

notify(data.error || "Failed to add plan")

}

}

/* LIVE REFRESH */

setInterval(loadActive,4000)
setInterval(loadStats,10000)
searchEmail.addEventListener("input",()=>{
loadUsers(1)
})
  
</script>

</body>
</html>
